<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login - AI Project Consultant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Client Portal</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to manage your AI consultations</p>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-sm" role="alert">
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}

        <form action="/portal/login" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="username">
                    Username
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500" 
                       id="username" name="username" type="text" placeholder="your_username" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">
                    Password
                </label>
                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline focus:border-blue-500" 
                       id="password" name="password" type="password" placeholder="••••••••" required>
            </div>
            
            <div class="flex items-center justify-between mb-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition-colors" type="submit">
                    Sign In
                </button>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-sm text-gray-600">Don't have an account? <a href="/portal/signup" class="text-blue-600 font-semibold hover:underline">Register here</a></p>
            </div>
        </form>
    </div>

</body>
</html>
